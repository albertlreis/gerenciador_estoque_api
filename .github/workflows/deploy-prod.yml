name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run production migrations during deploy
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-gerenciador-estoque-api
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      LOG_CHANNEL: testing_null

    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch master

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath, exif, gd, iconv, intl, pdo_mysql, simplexml, zip
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Start MySQL
        run: |
          docker rm -f estoque-test-mysql >/dev/null 2>&1 || true
          docker run -d \
            --name estoque-test-mysql \
            --log-driver=none \
            -e MYSQL_ROOT_PASSWORD=root \
            -e MYSQL_DATABASE=estoque_test \
            -e MYSQL_USER=dev \
            -e MYSQL_PASSWORD=troque-esta-senha-dev \
            -p 3306:3306 \
            --health-cmd="MYSQL_PWD=root mysqladmin ping -h 127.0.0.1 -uroot" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=10 \
            mysql:8.0

          for attempt in {1..60}; do
            status="$(docker inspect -f '{{.State.Health.Status}}' estoque-test-mysql 2>/dev/null || true)"
            if [ "${status}" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done

          echo "MySQL container did not become healthy"
          exit 1

      - name: Prepare environment
        run: |
          cp .env.testing.example .env.testing
          cp .env.testing.example .env
          composer install --no-interaction --prefer-dist
          npm install

      - name: Enable MySQL trigger creation in CI
        run: |
          mysql_container="$(docker ps --filter "name=estoque-test-mysql" --format '{{.ID}}' | head -n 1)"

          if [ -z "${mysql_container}" ]; then
            echo "MySQL service container not found"
            exit 1
          fi

          docker exec "${mysql_container}" sh -lc "MYSQL_PWD=root mysql -uroot -e 'SET GLOBAL log_bin_trust_function_creators = 1;'"
          docker exec "${mysql_container}" sh -lc "MYSQL_PWD=root mysql -uroot -e \"SHOW VARIABLES LIKE 'log_bin_trust_function_creators';\""

      - name: Run migrations
        env:
          APP_ENV: testing
        run: php artisan migrate --env=testing --force

      - name: Run tests
        run: php artisan test --without-tty

      - name: Stop MySQL
        if: always()
        run: docker rm -f estoque-test-mysql >/dev/null 2>&1 || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      RUN_MIGRATIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_migrations || 'false' }}

    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add droplet to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Trigger deploy on droplet
        run: |
          deploy_args=""
          backup_cmd=""

          if [ "${RUN_MIGRATIONS}" = "true" ]; then
            deploy_args="--migrate"
            backup_cmd="./html/scripts/backup-production.sh && "
          fi

          compose_fix_cmd="if [ -f docker-compose.yml ]; then cp docker-compose.yml docker-compose.yml.bak-version-obsolete && sed -i '/^version:/d' docker-compose.yml; fi"
          remote_command="cd /home/docker/acadsoft/sierra-estoque && repo_git_dir=\$(find . -maxdepth 3 -type d -name .git -print -quit) && repo_dir=\${repo_git_dir%/.git} && if [ -n \"\${repo_dir}\" ]; then git -C \"\${repo_dir}\" fetch origin master && git -C \"\${repo_dir}\" reset --hard origin/master && git -C \"\${repo_dir}\" clean -fd; fi && ${compose_fix_cmd} && ${backup_cmd}./deploy.sh ${deploy_args} && docker exec sierra_estoque_app sh -lc 'mkdir -p /var/www/html/storage/framework/cache/data /var/www/html/storage/logs /var/www/html/bootstrap/cache && chown -R www-data:www-data /var/www/html/storage/framework/cache /var/www/html/storage/logs /var/www/html/bootstrap/cache && chmod -R ug+rwX /var/www/html/storage/framework/cache /var/www/html/storage/logs /var/www/html/bootstrap/cache'"

          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "${remote_command}"
